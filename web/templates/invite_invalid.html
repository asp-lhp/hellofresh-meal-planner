<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invalid Invite - Meal Planner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 60px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 480px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 16px;
            font-weight: 600;
        }
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 12px;
        }
        .reasons {
            text-align: left;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin: 24px 0;
        }
        .reasons p {
            margin-bottom: 8px;
            font-size: 14px;
        }
        .contact {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }
        .contact p {
            font-size: 14px;
            color: #888;
        }
        a {
            color: #f5576c;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">❌</div>
        <h1>Invalid Invite Link</h1>
        <p>This invite link cannot be used.</p>
        <div class="reasons">
            <p>This could happen because:</p>
            <p>• The link has already been used</p>
            <p>• The link was revoked</p>
            <p>• The link is malformed or expired</p>
        </div>
        <div class="contact">
            <p>Need a new invite? Contact <a href="mailto:andre.sprague@carvana.com">andre.sprague@carvana.com</a></p>
        </div>
    </div>
</body>
</html>
