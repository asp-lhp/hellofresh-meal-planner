# Meal Planner Flask Web App
# Deploy with: fly deploy (from project root)

app = 'meal-planner-asp'
primary_region = 'dfw'

[build]

[env]
  API_BASE_URL = "https://meal-planner-api-asp.fly.dev/api"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
