# Meal Planner .NET API
# Deploy with: cd api && fly deploy

app = 'meal-planner-api-asp'
primary_region = 'dfw'

[build]

[env]
  DATABASE_PATH = "/app/data/recipes.db"

[[mounts]]
  source = 'meal_planner_db'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
